spring.application.name=taskflow-backend
# Server
server.port=8080

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/taskflow_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234@Admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=taskflow_secret_key_must_be_at_least_256_bits_long_for_hs256
jwt.expiration=86400000

# Logging
logging.level.org.springframework.security=DEBUG

#timezone
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
server.servlet.context-path=/
spring.jackson.time-zone=Asia/Kolkata
# spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss
# spring.jackson.serialization.write-dates-as-timestamps=false